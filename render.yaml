services:
  - type: web
    name: shared-skies-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # PurpleAir READ key — powers the live same-day nbr_pm25_50km feature.
      # sync:false means Render prompts you to set the secret in the dashboard
      # (never committed to git). Without it, predictions use the static
      # climatological fallback (stable, but not live).
      - key: PURPLEAIR_API_KEY
        sync: false
